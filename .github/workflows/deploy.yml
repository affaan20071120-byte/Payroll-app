name: Final Deploy Check

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Build
        run: |
          echo "Checking dependencies..."
          ls -R node_modules/jspdf || echo "jspdf missing"
          echo "Starting Build..."
          npm run build -- --logLevel info || (echo "Build FAILED" && exit 1)
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy
        uses: actions/deploy-pages@v4
